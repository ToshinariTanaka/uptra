<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>会員ページ | アプトレ</title>
  <link rel="stylesheet" href="styles/main.css" />
  <script>
    if (sessionStorage.getItem("uptraLoggedIn") !== "true") {
      window.location.href = "login.html";
    }
  </script>
</head>
<body>
  <main class="landing-wrap">
    <section class="hero">
      <p class="hero-kicker">Up塾トレーニング</p>
      <h1 class="hero-title">学習メニュー</h1>
      <p class="hero-copy">
        ログインしました。<br />
        ここから学習を始めてください。
      </p>

      <div class="hero-actions">
        <a class="btn btn-primary" href="https://gramup.sintechadev.top/ask-ai">英文読解トレーニング</a>
        <a class="btn btn-accent" href="trial-history.html">中学歴史一問一答基礎</a>
        <a class="btn btn-essay" href="https://toshinaritanaka.github.io/essay-training-app/">小論文トレーニング</a>
        <button id="logout-btn" class="btn btn-secondary" type="button">ログアウト</button>
      </div>
    </section>

    <section class="panel">
      <h2>今日のおすすめ</h2>
      <p>
        英文読解・歴史一問一答・小論文トレーニングを少しずつ進めましょう。
      </p>
    </section>
  </main>

  <script>
    document.getElementById("logout-btn").addEventListener("click", function () {
      sessionStorage.removeItem("uptraLoggedIn");
      window.location.href = "login.html";
    });
  </script>
</body>
</html>

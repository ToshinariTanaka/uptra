<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ログイン | アプトレ</title>
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body class="login-page">
  <main class="landing-wrap login-wrap">
    <section class="hero login-hero">
      <div class="login-hero-inner">
        <p class="hero-kicker login-kicker">Up塾トレーニング</p>
        <h1 class="hero-title login-title">ログイン</h1>
        <p class="hero-copy login-copy">
          塾生用ページです。<br />
          パスワードを入力してください。
        </p>
      </div>

      <section class="panel login-panel" aria-label="ログインフォーム">
        <form id="login-form">
          <label class="form-label" for="password">パスワード</label>
          <input
            class="form-input"
            id="password"
            type="password"
            placeholder="パスワードを入力"
            autocomplete="current-password"
          />
          <button class="btn btn-primary login-submit" type="submit">ログイン</button>
          <p id="error-message" class="login-error" style="display: none;">
            パスワードが違います。
          </p>
        </form>
      </section>
    </section>
  </main>

  <script>
    const LOGIN_PASSWORD = "123456";

    document.getElementById("login-form").addEventListener("submit", function (e) {
      e.preventDefault();

      const password = document.getElementById("password").value;
      const errorMessage = document.getElementById("error-message");

      if (password === LOGIN_PASSWORD) {
        sessionStorage.setItem("uptraLoggedIn", "true");
        window.location.href = "dashboard.html";
      } else {
        errorMessage.style.display = "block";
      }
    });
  </script>
</body>
</html>
